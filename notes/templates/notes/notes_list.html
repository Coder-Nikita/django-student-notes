{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>My Notes</h2>

{% for note in notes %}

<div class="card mt-3">
    <div class="card-body">
        <h5>{{ note.title }}</h5>
        <p>{{ note.content }}</p>
    </div>
</div>

{% empty %}

<p>No notes yet.</p>

{% endfor %}

</div>

{% endblock %}
