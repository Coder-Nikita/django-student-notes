{% extends 'notes/base.html' %}

{% block content %}

<h2>Your Notes</h2>

{% for note in notes %}

<div class="card mb-3 p-3">

<h4>{{ note.title }}</h4>
<p>{{ note.content }}</p>

<a href="/update/{{note.id}}" class="btn btn-warning">Edit</a>
<a href="/delete/{{note.id}}" class="btn btn-danger">Delete</a>

</div>

{% endfor %}

{% endblock %}
